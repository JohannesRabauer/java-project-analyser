name: java-project-analyser

services:
  db:
    image: pgvector/pgvector:pg17
    profiles: [local, openai, anthropic]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-analyser}
      POSTGRES_USER: ${POSTGRES_USER:-analyser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-analyser}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    profiles: [local]
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  app:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,db,ollama}
    profiles: [local, openai, anthropic]
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
        required: false
    environment:
      QUARKUS_PROFILE: ${QUARKUS_PROFILE:-local}
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-analyser}
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER:-analyser}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-analyser}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8080:8080"
    volumes:
      - ${WORKSPACE_PATH:-./workspace}:/workspace:ro
      - ${CACHE_PATH:-./cache}:/cache:rw
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/q/health/ready >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  db-data:
  ollama-models:
