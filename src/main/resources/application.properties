quarkus.application.name=java-project-analyser
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:analyser}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:analyser}
%prod.quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/analyser}
%dev.quarkus.datasource.devservices.enabled=true
%dev.quarkus.datasource.devservices.image-name=pgvector/pgvector:pg17
%dev.quarkus.datasource.devservices.db-name=analyser
%dev.quarkus.datasource.devservices.username=analyser
%dev.quarkus.datasource.devservices.password=analyser
%test.quarkus.datasource.devservices.enabled=false
quarkus.flyway.migrate-at-start=true
quarkus.flyway.connect-retries=10
quarkus.flyway.locations=classpath:db/migration

# RAG configuration
rag.embedding.dimension=384
rag.search.similarity-threshold=0.5

# LLM configuration
quarkus.langchain4j.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}

# Pipeline model (bulk analysis — can be cheap/local)
analyser.pipeline.model-provider=${PIPELINE_MODEL_PROVIDER:ollama}
analyser.pipeline.model-name=${PIPELINE_MODEL_NAME:llama3}
analyser.pipeline.openai-api-key=${OPENAI_API_KEY:}

# Query model (on-demand reasoning — can be high-quality)
analyser.query.model-provider=${QUERY_MODEL_PROVIDER:ollama}
analyser.query.model-name=${QUERY_MODEL_NAME:llama3}
analyser.query.openai-api-key=${OPENAI_API_KEY:}

# Embedding model
analyser.embedding.provider=${EMBEDDING_PROVIDER:ollama}
analyser.embedding.model-name=${EMBEDDING_MODEL_NAME:nomic-embed-text}
analyser.embedding.openai-api-key=${OPENAI_API_KEY:}

# Server
quarkus.http.host=0.0.0.0
mcp.stdio.enabled=${MCP_STDIO_ENABLED:false}

# Cache
analysis.cache-path=${CACHE_PATH:analysis-cache}
